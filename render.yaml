services:
  - type: web
    name: trackme-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trackme-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: trackme-frontend
    env: static
    buildCommand: echo "Using pre-built frontend/dist from repository"
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: trackme-db
    plan: free
